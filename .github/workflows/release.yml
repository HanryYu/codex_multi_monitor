name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    env:
      CERTIFICATE: ${{ secrets.DEVELOPER_ID_APPLICATION }}
      CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Import Code-Signing Certs
        if: env.CERTIFICATE != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          p12-password: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}

      - name: Code sign binary
        if: env.CERTIFICATE != ''
        run: |
          BINARY=".build/release/CodexMonitor"
          IDENTITY=$(security find-identity -v -p codesigning signing_temp.keychain 2>/dev/null | grep -E "Developer ID Application|Apple Development" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "::warning::No signing identity found — skipping signing"
            exit 0
          fi
          echo "Signing with identity: $IDENTITY"
          codesign --force --options runtime --sign "$IDENTITY" "$BINARY"
          codesign --verify --verbose "$BINARY"

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/build-dmg.sh "$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .build/CodexMonitor-*.dmg
          generate_release_notes: true
