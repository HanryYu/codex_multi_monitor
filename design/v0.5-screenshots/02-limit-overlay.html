<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Monitor - Limit Overlay Feature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#FF6B00',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover no-repeat;
            -webkit-font-smoothing: antialiased;
        }
        .mac-popover {
            background: rgba(246, 246, 246, 0.9);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            box-shadow: 
                0 0 0 0.5px rgba(0, 0, 0, 0.15),
                0 12px 30px rgba(0, 0, 0, 0.2),
                0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .popover-arrow {
            border-bottom-color: rgba(246, 246, 246, 0.9);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-slate-900">

    <div class="relative pt-2.5 select-none">
        
        <div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-0 h-0 border-[7px] border-transparent popover-arrow z-30"></div>

        <div class="mac-popover w-[320px] rounded-[10px] overflow-hidden text-slate-700 z-20 relative flex flex-col max-h-[580px]">
            
            <div class="flex justify-between items-center px-4 pt-3 pb-2 border-b border-black/[0.04] bg-black/[0.01]">
                <span class="text-[11px] font-bold tracking-wide text-slate-400 uppercase">Codex Monitor</span>
                <span class="text-[10px] text-slate-500 bg-black/[0.04] px-1.5 py-0.5 rounded">多账户监控</span>
            </div>

            <div class="p-3 space-y-3 overflow-y-auto no-scrollbar flex-1">
                
                <div class="relative bg-white/30 border border-red-500/20 rounded-lg p-3 shadow-[0_0_8px_rgba(239,68,68,0.04)] overflow-hidden group">
                    
                    <div class="opacity-40 mix-blend-luminosity pointer-events-none">
                        <div class="flex justify-between items-center mb-2.5">
                            <div class="flex items-center gap-1.5">
                                <span class="text-xs font-semibold text-slate-800 line-through">Personal</span>
                                <span class="text-[9px] font-bold bg-slate-400/20 text-slate-600 px-1 py-0.2 rounded-sm">Plus</span>
                            </div>
                            <span class="text-[10px] text-slate-400 font-mono">#1024</span>
                        </div>

                        <div class="grid grid-cols-2 gap-2">
                            <div class="bg-black/[0.02] border border-black/[0.03] rounded p-2">
                                <div class="text-[9px] text-slate-400 font-medium mb-1">5小时限额</div>
                                <div class="text-lg font-bold tracking-tight text-slate-800">0%</div>
                                <div class="w-full bg-black/5 h-[3px] rounded-full mt-1.5 overflow-hidden">
                                    <div class="bg-slate-400 h-full w-full"></div>
                                </div>
                            </div>
                            <div class="bg-black/[0.02] border border-black/[0.03] rounded p-2">
                                <div class="text-[9px] text-slate-400 font-medium mb-1">每周限额</div>
                                <div class="text-lg font-bold tracking-tight text-slate-800">12%</div>
                                <div class="w-full bg-black/5 h-[3px] rounded-full mt-1.5 overflow-hidden">
                                    <div class="bg-slate-400 h-full w-[88%]"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="absolute inset-0 bg-gradient-to-b from-red-500/[0.06] to-slate-900/[0.04] backdrop-blur-[0.5px] flex items-center justify-center z-10">
                        <div class="bg-red-500/10 border border-red-500/20 px-2.5 py-1 rounded shadow-sm backdrop-blur-md flex items-center gap-1">
                            <i class="fa-solid fa-circle-exclamation text-red-500 text-[10px]"></i>
                            <span class="text-[11px] font-semibold text-red-600 tracking-wide">限额已达</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white/50 border border-white/40 rounded-lg p-3 transition-all hover:bg-white/60">
                    <div class="flex justify-between items-center mb-2.5">
                        <div class="flex items-center gap-1.5">
                            <span class="text-xs font-semibold text-slate-800">Work Team</span>
                            <span class="text-[9px] font-bold bg-brand/10 text-brand px-1 py-0.2 rounded-sm tracking-wide">PRO</span>
                        </div>
                        <span class="text-[10px] text-emerald-500 font-medium flex items-center gap-0.5">
                            <span class="w-1 h-1 rounded-full bg-emerald-500 inline-block animate-pulse"></span> 正常
                        </span>
                    </div>

                    <div class="grid grid-cols-2 gap-2">
                        <div class="bg-white/30 border border-white/50 rounded p-2">
                            <div class="text-[9px] text-slate-400 font-medium mb-0.5">5小时限额</div>
                            <div class="flex justify-between items-baseline">
                                <span class="text-lg font-bold tracking-tight text-slate-900">67%</span>
                                <span class="text-[8px] text-slate-400 font-mono">剩余</span>
                            </div>
                            <div class="w-full bg-black/5 h-[3px] rounded-full mt-1.5 overflow-hidden">
                                <div class="bg-emerald-500 h-full" style="width: 33%"></div>
                            </div>
                            <div class="text-[8px] text-slate-400 font-mono mt-1 flex items-center gap-0.5">
                                <i class="fa-regular fa-clock text-[7px]"></i> 61h 后重置
                            </div>
                        </div>

                        <div class="bg-white/30 border border-white/50 rounded p-2">
                            <div class="text-[9px] text-slate-400 font-medium mb-0.5">每周限额</div>
                            <div class="flex justify-between items-baseline">
                                <span class="text-lg font-bold tracking-tight text-slate-900">23%</span>
                                <span class="text-[8px] text-slate-400 font-mono">剩余</span>
                            </div>
                            <div class="w-full bg-black/5 h-[3px] rounded-full mt-1.5 overflow-hidden">
                                <div class="bg-brand h-full" style="width: 77%"></div>
                            </div>
                            <div class="text-[8px] text-slate-400 font-mono mt-1 flex items-center gap-0.5">
                                <i class="fa-regular fa-clock text-[7px]"></i> 13h 后重置
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="border-t border-black/[0.04] bg-black/[0.02] px-3.5 py-2 flex justify-between items-center text-[10px] text-slate-400 shrink-0">
                <div class="flex items-center gap-1">
                    <i class="fa-solid fa-arrow-rotate-right text-[9px]"></i>
                    <span>14:39 更新</span>
                </div>
                <div class="flex items-center gap-3">
                    <button class="hover:text-brand transition-colors focus:outline-none">偏好设置...</button>
                    <span class="text-black/[0.08]">|</span>
                    <button class="hover:text-red-500 transition-colors focus:outline-none flex items-center gap-0.5">
                        <i class="fa-solid fa-power-off text-[9px]"></i> 退出
                    </button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
