<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Cloud Monitor — Popover Prototype</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
        }

        /* ── Popover Container ── */
        .popover {
            width: 340px;
            border-radius: 12px;
            overflow: visible;
            position: relative;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            box-shadow:
                0 0 0 0.5px rgba(0, 0, 0, 0.08),
                0 12px 40px rgba(0, 0, 0, 0.18),
                0 2px 8px rgba(0, 0, 0, 0.06);
            color: #1d1d1f;
        }

        /* Popover arrow */
        .popover-arrow {
            position: absolute;
            top: -7px;
            left: 50%;
            width: 14px;
            height: 14px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 3px;
            transform: translateX(-50%) rotate(45deg);
            box-shadow: -1px -1px 0 0 rgba(0,0,0,0.05);
            z-index: -1;
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px 8px;
            user-select: none;
        }

        .account-name {
            font-size: 11px;
            font-weight: 500;
            color: #86868b;
            letter-spacing: 0.02em;
        }

        .refresh-area {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            border: none;
            background: none;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.15s;
            font-family: inherit;
        }
        .refresh-area:hover { background: rgba(0,0,0,0.04); }

        .refresh-time {
            font-size: 10px;
            color: #aeaeb2;
            font-variant-numeric: tabular-nums;
        }

        .refresh-icon {
            display: inline-flex;
            align-items: center;
            color: #aeaeb2;
            transition: color 0.15s;
        }
        .refresh-area:hover .refresh-icon,
        .refresh-area:hover .refresh-time { color: #FF6B00; }
        .refresh-icon.spinning {
            animation: spin 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ── Divider ── */
        .divider {
            height: 0.5px;
            background: rgba(0, 0, 0, 0.08);
            margin: 0 16px;
        }

        /* ── Quota Cards ── */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 12px 16px;
        }

        .quota-card {
            background: rgba(255, 255, 255, 0.55);
            border: 0.5px solid rgba(0, 0, 0, 0.06);
            border-radius: 10px;
            padding: 12px 14px 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 108px;
            transition: background 0.2s, transform 0.15s;
        }
        .quota-card:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-1px);
        }

        .card-label {
            font-size: 10.5px;
            font-weight: 500;
            color: #86868b;
            letter-spacing: 0.04em;
        }

        .card-value-area { margin: 6px 0; }

        .card-percentage {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
            color: #1d1d1f;
            font-variant-numeric: tabular-nums;
        }

        .card-sublabel {
            font-size: 9.5px;
            font-weight: 500;
            color: #aeaeb2;
            margin-top: 3px;
            letter-spacing: 0.02em;
        }

        /* ── Progress Bar ── */
        .progress-track {
            width: 100%;
            height: 3px;
            background: rgba(0, 0, 0, 0.06);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .progress-fill.state-green  { background: linear-gradient(90deg, #34c759, #30d158); }
        .progress-fill.state-orange { background: linear-gradient(90deg, #FF6B00, #FF8A33); }
        .progress-fill.state-red    { background: linear-gradient(90deg, #ff3b30, #ff453a); }

        /* ── Footer ── */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px 10px;
            border-top: 0.5px solid rgba(0, 0, 0, 0.06);
            background: rgba(0, 0, 0, 0.01);
            border-radius: 0 0 12px 12px;
        }

        .footer-link {
            font-size: 11px;
            color: #86868b;
            text-decoration: none;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
        }
        .footer-link:hover {
            color: #FF6B00;
            background: rgba(255, 107, 0, 0.06);
        }

        /* ── Demo Controls ── */
        .demo-controls {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 10px;
            border: 0.5px solid rgba(255,255,255,0.15);
        }
        .demo-btn {
            font-size: 12px;
            color: #fff;
            background: rgba(255,255,255,0.12);
            border: 0.5px solid rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .demo-btn:hover { background: rgba(255,255,255,0.2); }
        .demo-btn.active { background: #FF6B00; border-color: #FF6B00; }
    </style>
</head>
<body>

    <div class="popover">
        <div class="popover-arrow"></div>

        <!-- Header -->
        <div class="header">
            <span class="account-name">Henry Pro</span>
            <button class="refresh-area" onclick="triggerRefresh()">
                <span class="refresh-time" id="refresh-time">--:-- 更新</span>
                <span class="refresh-icon" id="refresh-icon">
                    <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
                        <path d="M13.65 2.35A7.96 7.96 0 0 0 8 0a8 8 0 1 0 8 8h-2A6 6 0 1 1 8 2c1.66 0 3.14.69 4.22 1.78L9 7h7V0l-2.35 2.35Z" fill="currentColor"/>
                    </svg>
                </span>
            </button>
        </div>

        <div class="divider"></div>

        <!-- Quota Cards -->
        <div class="cards-grid">
            <div class="quota-card">
                <span class="card-label">5小时限额</span>
                <div class="card-value-area">
                    <div class="card-percentage" id="q1-value">42%</div>
                    <div class="card-sublabel">剩余</div>
                </div>
                <div class="progress-track">
                    <div class="progress-fill state-orange" id="q1-bar" style="width: 58%"></div>
                </div>
            </div>

            <div class="quota-card">
                <span class="card-label">每周限额</span>
                <div class="card-value-area">
                    <div class="card-percentage" id="q2-value">84%</div>
                    <div class="card-sublabel">剩余</div>
                </div>
                <div class="progress-track">
                    <div class="progress-fill state-green" id="q2-bar" style="width: 16%"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a class="footer-link">偏好设置…</a>
            <a class="footer-link">管理账户…</a>
        </div>
    </div>

    <!-- Demo Controls -->
    <div class="demo-controls">
        <button class="demo-btn" onclick="setScenario('low')">低用量</button>
        <button class="demo-btn" onclick="setScenario('medium')">中用量</button>
        <button class="demo-btn" onclick="setScenario('high')">高用量</button>
        <button class="demo-btn" onclick="setScenario('critical')">临界</button>
    </div>

    <script>
        const scenarios = {
            low:      { q1: 82, q2: 91 },
            medium:   { q1: 42, q2: 84 },
            high:     { q1: 15, q2: 38 },
            critical: { q1: 5,  q2: 8  },
        };

        let isRefreshing = false;

        function triggerRefresh() {
            if (isRefreshing) return;
            isRefreshing = true;
            const icon = document.getElementById('refresh-icon');
            const timeEl = document.getElementById('refresh-time');
            icon.classList.add('spinning');
            timeEl.style.opacity = '0.4';
            setTimeout(() => {
                icon.classList.remove('spinning');
                timeEl.style.opacity = '1';
                const now = new Date();
                timeEl.textContent =
                    String(now.getHours()).padStart(2,'0') + ':' +
                    String(now.getMinutes()).padStart(2,'0') + ' 更新';
                isRefreshing = false;
            }, 600);
        }

        function colorClass(used) {
            if (used >= 90) return 'state-red';
            if (used >= 60) return 'state-orange';
            return 'state-green';
        }

        function setScenario(key) {
            const s = scenarios[key];
            document.getElementById('q1-value').textContent = s.q1 + '%';
            document.getElementById('q2-value').textContent = s.q2 + '%';
            const u1 = 100 - s.q1, u2 = 100 - s.q2;
            const b1 = document.getElementById('q1-bar');
            const b2 = document.getElementById('q2-bar');
            b1.style.width = u1 + '%';
            b2.style.width = u2 + '%';
            b1.className = 'progress-fill ' + colorClass(u1);
            b2.className = 'progress-fill ' + colorClass(u2);
            // highlight active button
            document.querySelectorAll('.demo-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Init
        (function() {
            const now = new Date();
            document.getElementById('refresh-time').textContent =
                String(now.getHours()).padStart(2,'0') + ':' +
                String(now.getMinutes()).padStart(2,'0') + ' 更新';
        })();
    </script>

</body>
</html>
