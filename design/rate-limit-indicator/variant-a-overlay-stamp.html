<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方案 A — 红色遮罩 + LIMITED 徽章 + 删除线</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
            padding: 40px 20px;
        }

        h1 { color: #fff; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
        .subtitle { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 6px; }

        /* ── Popover Container ── */
        .popover {
            width: 340px;
            border-radius: 12px;
            overflow: visible;
            position: relative;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            box-shadow:
                0 0 0 0.5px rgba(0, 0, 0, 0.08),
                0 12px 40px rgba(0, 0, 0, 0.18),
                0 2px 8px rgba(0, 0, 0, 0.06);
            color: #1d1d1f;
        }

        .popover-arrow {
            position: absolute;
            top: -7px;
            left: 50%;
            width: 14px; height: 14px;
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(30px);
            border-radius: 3px;
            transform: translateX(-50%) rotate(45deg);
            box-shadow: -1px -1px 0 0 rgba(0,0,0,0.05);
            z-index: -1;
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px 8px;
        }
        .account-name { font-size: 11px; font-weight: 500; color: #86868b; }
        .plan-badge {
            font-size: 9px; font-weight: 600;
            color: #FF6B00;
            background: rgba(255,107,0,0.12);
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 6px;
        }
        .refresh-area {
            display: flex; align-items: center; gap: 5px;
            cursor: pointer; border: none; background: none;
            padding: 2px 6px; border-radius: 4px;
            font-family: inherit;
        }
        .refresh-time { font-size: 10px; color: #aeaeb2; font-variant-numeric: tabular-nums; }
        .refresh-icon { display: inline-flex; align-items: center; color: #aeaeb2; }

        .divider { height: 0.5px; background: rgba(0,0,0,0.08); margin: 0 16px; }

        /* ── Cards Grid ── */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 12px 16px;
        }

        .quota-card {
            background: rgba(255,255,255,0.55);
            border: 0.5px solid rgba(0,0,0,0.06);
            border-radius: 10px;
            padding: 12px 14px 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 108px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .card-label {
            font-size: 10.5px; font-weight: 500; color: #86868b;
            letter-spacing: 0.04em;
        }
        .card-percentage {
            font-size: 34px; font-weight: 700;
            letter-spacing: -0.02em; line-height: 1;
            color: #1d1d1f;
            font-variant-numeric: tabular-nums;
        }
        .card-sublabel {
            font-size: 9.5px; font-weight: 500; color: #aeaeb2;
            margin-top: 3px;
        }
        .progress-track {
            width: 100%; height: 3px;
            background: rgba(0,0,0,0.06);
            border-radius: 2px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; border-radius: 2px;
            transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
        }
        .progress-fill.green  { background: linear-gradient(90deg, #34c759, #30d158); }
        .progress-fill.orange { background: linear-gradient(90deg, #FF6B00, #FF8A33); }
        .progress-fill.red    { background: linear-gradient(90deg, #ff3b30, #ff453a); }

        /* ── 方案 A: LIMITED 状态 ── */
        .quota-card.limited {
            background: rgba(255, 59, 48, 0.06);
            border-color: rgba(255, 59, 48, 0.2);
        }
        .quota-card.limited .card-label {
            text-decoration: line-through;
            color: #ff3b30;
            opacity: 0.8;
        }
        .quota-card.limited .card-percentage {
            color: #ff3b30;
            opacity: 0.7;
        }
        .quota-card.limited .card-sublabel {
            color: #ff3b30;
            opacity: 0.6;
        }
        .quota-card.limited .progress-fill {
            background: linear-gradient(90deg, #ff3b30, #ff453a) !important;
            width: 100% !important;
        }

        /* LIMITED 徽章 */
        .stamp {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #ff3b30;
            background: rgba(255, 59, 48, 0.1);
            border: 1px solid rgba(255, 59, 48, 0.25);
            padding: 2px 6px;
            border-radius: 4px;
            transform: rotate(-3deg);
            text-transform: uppercase;
            pointer-events: none;
        }

        /* 锁定图标 overlay */
        .lock-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 59, 48, 0.04);
            pointer-events: none;
        }
        .lock-icon {
            width: 28px; height: 28px;
            color: rgba(255, 59, 48, 0.2);
        }

        /* ── Footer ── */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px 10px;
            border-top: 0.5px solid rgba(0,0,0,0.06);
            background: rgba(0,0,0,0.01);
            border-radius: 0 0 12px 12px;
        }
        .footer-link {
            font-size: 11px; color: #86868b;
            text-decoration: none; cursor: pointer;
            padding: 2px 4px; border-radius: 4px;
        }

        /* ── Demo Controls ── */
        .demo-controls {
            display: flex; gap: 12px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(20px);
            padding: 10px 20px; border-radius: 10px;
            border: 0.5px solid rgba(255,255,255,0.15);
        }
        .demo-btn {
            font-size: 12px; color: #fff;
            background: rgba(255,255,255,0.12);
            border: 0.5px solid rgba(255,255,255,0.2);
            padding: 6px 14px; border-radius: 6px;
            cursor: pointer; font-family: inherit;
        }
        .demo-btn.active { background: #FF6B00; border-color: #FF6B00; }

        /* ── Annotated version ── */
        .annotations {
            max-width: 340px;
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            line-height: 1.8;
            margin-top: 16px;
        }
        .annotations strong { color: #FF6B00; }
    </style>
</head>
<body>

    <div>
        <h1>方案 A — 红色遮罩 + LIMITED 徽章 + 删除线</h1>
        <p class="subtitle">高辨识度 · 视觉冲击力强 · 占用空间小</p>
    </div>

    <div class="popover">
        <div class="popover-arrow"></div>

        <!-- Account 1: LIMITED -->
        <div class="header">
            <div style="display:flex;align-items:center;">
                <span class="account-name" style="text-decoration:line-through; color:#ff3b30;">Henry Pro</span>
                <span class="plan-badge" style="background:rgba(255,59,48,0.1); color:#ff3b30;">Pro</span>
            </div>
            <button class="refresh-area">
                <span class="refresh-time">14:32 更新</span>
                <span class="refresh-icon">
                    <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
                        <path d="M13.65 2.35A7.96 7.96 0 0 0 8 0a8 8 0 1 0 8 8h-2A6 6 0 1 1 8 2c1.66 0 3.14.69 4.22 1.78L9 7h7V0l-2.35 2.35Z" fill="currentColor"/>
                    </svg>
                </span>
            </button>
        </div>
        <div class="divider"></div>
        <div class="cards-grid">
            <div class="quota-card limited">
                <span class="stamp">LIMITED</span>
                <div class="lock-overlay">
                    <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <span class="card-label">5小时限额</span>
                <div>
                    <div class="card-percentage">0%</div>
                    <div class="card-sublabel">剩余</div>
                </div>
                <div class="progress-track">
                    <div class="progress-fill red" style="width:100%"></div>
                </div>
            </div>
            <div class="quota-card limited">
                <span class="stamp">LIMITED</span>
                <span class="card-label">每周限额</span>
                <div>
                    <div class="card-percentage">0%</div>
                    <div class="card-sublabel">剩余</div>
                </div>
                <div class="progress-track">
                    <div class="progress-fill red" style="width:100%"></div>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Account 2: Normal -->
        <div class="header">
            <div style="display:flex;align-items:center;">
                <span class="account-name">Henry Team</span>
                <span class="plan-badge">Team</span>
            </div>
            <button class="refresh-area">
                <span class="refresh-time">14:32 更新</span>
                <span class="refresh-icon">
                    <svg width="11" height="11" viewBox="0 0 16 16" fill="none">
                        <path d="M13.65 2.35A7.96 7.96 0 0 0 8 0a8 8 0 1 0 8 8h-2A6 6 0 1 1 8 2c1.66 0 3.14.69 4.22 1.78L9 7h7V0l-2.35 2.35Z" fill="currentColor"/>
                    </svg>
                </span>
            </button>
        </div>
        <div class="divider"></div>
        <div class="cards-grid">
            <div class="quota-card">
                <span class="card-label">5小时限额</span>
                <div>
                    <div class="card-percentage">67%</div>
                    <div class="card-sublabel">剩余</div>
                </div>
                <div class="progress-track">
                    <div class="progress-fill green" style="width:33%"></div>
                </div>
            </div>
            <div class="quota-card">
                <span class="card-label">每周限额</span>
                <div>
                    <div class="card-percentage">42%</div>
                    <div class="card-sublabel">剩余</div>
                </div>
                <div class="progress-track">
                    <div class="progress-fill orange" style="width:58%"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <a class="footer-link">偏好设置…</a>
            <a class="footer-link">管理账户…</a>
        </div>
    </div>

    <div class="annotations">
        <strong>设计要点：</strong><br>
        • 账户名 + 计划标签同时变红 + 删除线<br>
        • 卡片背景微红底色，边框变红<br>
        • LIMITED 徽章旋转 -3°，模拟印章效果<br>
        • 半透明锁定图标作为中心遮罩<br>
        • 进度条锁定为 100% 红色<br>
        • 正常账户保持原有风格不变
    </div>

</body>
</html>
