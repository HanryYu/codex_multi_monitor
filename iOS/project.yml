name: CodexMonitoriOS
options:
  bundleIdPrefix: com.henry
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: LVKMK8ZPGF
targets:
  CodexMonitoriOS:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
      - path: ../Sources/CodexMonitor/Shared
      - path: ../Sources/CodexMonitor/Models/UsageResponse.swift
      - path: ../Sources/CodexMonitor/Services/APIService.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.henry.codex-monitor.ios
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/CodexMonitoriOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: CodexMonitorWidgets
  CodexMonitorWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
      - path: Shared
      - path: ../Sources/CodexMonitor/Shared
      - path: ../Sources/CodexMonitor/Models/UsageResponse.swift
      - path: ../Sources/CodexMonitor/Services/APIService.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.henry.codex-monitor.ios.widgets
        INFOPLIST_FILE: Widgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widgets/CodexMonitorWidgets.entitlements
        SKIP_INSTALL: YES
